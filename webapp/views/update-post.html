<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DevBook - Edit Post - {{ .Title }}</title>
  <link href="/assets/css/bootstrap.css" rel="stylesheet" />
</head>

<body>
  {{ template "header"}}

  <div class="container-fluid">
    <div class="row mt-4">
      <div class="col-12">
        <h3>Update Post</h3>
        <div class="form-group">
          <label for="title">Title</label>
          <input type="text" id="title" name="title" class="form-control" placeholder="Enter title" value="{{ .Title }}" />
        </div>
        <div class="form-group">
          <label for="content">Content</label>
          <textarea id="content" name="content" class="form-control" placeholder="Enter content">{{ .Content }}</textarea>
        </div>
        <button id="update-post" class="btn btn-info data-post-id={{ .ID }}">
          Save Changes
        </button>
      </div>
    </div>
  </div>

  {{ template "footer" }}
  {{ template "scripts" }}

  <script src="/assets/js/posts.js"></script>

</body>

</html>
