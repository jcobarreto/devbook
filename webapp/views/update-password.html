<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DevBook - Update Password</title>
  <link href="/assets/css/bootstrap.css" rel="stylesheet" />
</head>

<body>
  {{ template "header"}}

  <div class="container-fluid">
    <div class="row mt-4">
      <div class="col-12">
        <h3>Update Password</h3>
        <form id="update-password">
          <div class="form-group">
            <label for="current-password">Current Password</label>
            <input type="password" id="current-password" name="current-password" class="form-control" placeholder="Enter current password" />
          </div>
          <div class="form-group">
            <label for="new-password">New Password</label>
            <input type="password" id="new-password" name="new-password" class="form-control" placeholder="Enter new password" />
          </div>
          <div class="form-group">
            <label for="confirm-password">Confirm New Password</label>
            <input type="password" id="confirm-password" name="confirm-password" class="form-control" placeholder="Confirm new password" />
          </div>
          <button id="update-password" class="btn btn-info" type="submit">
            Update Password
          </button>
        </form>
      </div>
    </div>
  </div>

  {{ template "footer" }}
  {{ template "scripts" }}

  <script src="/assets/js/user.js"></script>

</body>

</html>
